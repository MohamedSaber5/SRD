<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&amp;family=Manrope:wght@400;700;800&amp;family=Work+Sans:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#ffdea5",
                        "inverse-on-surface": "#eff1f3",
                        "surface-container": "#eceef0",
                        "inverse-surface": "#2d3133",
                        "on-secondary-fixed-variant": "#5d4201",
                        "on-background": "#191c1e",
                        "on-primary-fixed-variant": "#1f477b",
                        "on-primary-container": "#799dd6",
                        "secondary": "#775a19",
                        "surface": "#f7f9fb",
                        "on-tertiary-fixed": "#111c2d",
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#a7c8ff",
                        "on-tertiary-container": "#919cb3",
                        "tertiary-fixed": "#d8e3fb",
                        "primary-fixed-dim": "#a7c8ff",
                        "primary-fixed": "#d5e3ff",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#001b3c",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#3c475a",
                        "on-primary": "#ffffff",
                        "surface-tint": "#3a5f94",
                        "primary-container": "#003366",
                        "surface-container-high": "#e6e8ea",
                        "on-secondary-container": "#785a1a",
                        "on-error": "#ffffff",
                        "primary": "#001e40",
                        "background": "#f7f9fb",
                        "tertiary-fixed-dim": "#bcc7de",
                        "tertiary-container": "#293446",
                        "surface-variant": "#e0e3e5",
                        "tertiary": "#141f30",
                        "error-container": "#ffdad6",
                        "outline-variant": "#c3c6d1",
                        "surface-container-highest": "#e0e3e5",
                        "surface-container-low": "#f2f4f6",
                        "outline": "#737780",
                        "on-surface-variant": "#43474f",
                        "secondary-fixed-dim": "#e9c176",
                        "error": "#ba1a1a",
                        "surface-bright": "#f7f9fb",
                        "on-secondary-fixed": "#261900",
                        "on-surface": "#191c1e",
                        "surface-dim": "#d8dadc",
                        "secondary-container": "#fed488"
                    },
                    "fontFamily": {
                        "headline": ["Tajawal", "Manrope", "sans-serif"],
                        "body": ["IBM Plex Sans Arabic", "Work Sans", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Tajawal', sans-serif; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
        }
        .bg-spatial-gradient {
            background: radial-gradient(circle at 0% 0%, #d5e3ff 0%, transparent 40%),
                        radial-gradient(circle at 100% 100%, #ffdea5 0%, transparent 40%),
                        #f7f9fb;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-spatial-gradient min-h-screen flex items-center justify-center p-4 md:p-8">
<!-- Signup Container -->
<main class="w-full max-w-5xl flex flex-col md:flex-row gap-0 overflow-hidden rounded-[2rem] shadow-2xl bg-surface-container-lowest">
<!-- Left Side: Informational/Brand Visual (Desktop) -->
<section class="hidden md:flex md:w-2/5 relative bg-primary overflow-hidden items-center justify-center p-12 text-center">
<div class="absolute inset-0 opacity-20">
<img alt="Academy Campus Architecture" class="w-full h-full object-cover" data-alt="Modern academic building with sleek glass architecture and geometric patterns under clear blue sky reflecting authority" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCZe0z7YRzJBTvkRxABjY4c00sfpsazuY6yD9xl2j-l6CRXA58Zn4oItLYSFdNUUyNYJJ7cvcbMuuQ9QV2ad6Wfh8nwrYoNgBMgRFukRbqk59GLHSAO8bSnk_p_e8OWlDNBz0LJHaxez-e4IWFAaDlBiGbjKxsBCP1rXzM_ku4_L-eiMdJhmiy2-vLJ7-CTdcIYIg_3TwlPysVhDPwRp0WZ7dBOO12GT8JaU49iD-RNYvagqMZW9ai87BhxH1u7e3hsH2TNfdLNf2SS"/>
</div>
<div class="relative z-10 space-y-6">
<div class="w-20 h-20 bg-secondary-fixed rounded-2xl mx-auto flex items-center justify-center shadow-lg transform rotate-3">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="school">school</span>
</div>
<h2 class="text-3xl font-black text-white tracking-tight leading-tight">بوابة الأكاديمية الحديثة</h2>
<p class="text-primary-fixed-dim text-lg leading-relaxed">انضم إلى المنظومة الرقمية المتطورة لإدارة الموارد والقاعات الدراسية بكل سهولة واحترافية.</p>
<div class="pt-8 grid grid-cols-2 gap-4">
<div class="bg-primary-container/40 p-4 rounded-xl border border-white/5">
<p class="text-secondary-fixed font-bold text-2xl">24/7</p>
<p class="text-white/60 text-xs mt-1">وصول مستمر</p>
</div>
<div class="bg-primary-container/40 p-4 rounded-xl border border-white/5">
<p class="text-secondary-fixed font-bold text-2xl">100%</p>
<p class="text-white/60 text-xs mt-1">نظام آمن</p>
</div>
</div>
</div>
</section>
<!-- Right Side: Signup Form Content -->
<section class="w-full md:w-3/5 p-8 md:p-12 lg:p-16 overflow-y-auto max-h-[921px]">
<div class="max-w-md mx-auto">
<header class="mb-10 text-right">
<h1 class="text-4xl font-black text-on-surface tracking-tight mb-2">إنشاء حساب جديد</h1>
<p class="text-on-surface-variant text-lg">ابدأ رحلتك في تنظيم وإدارة البيئة التعليمية</p>
</header>
<form class="space-y-8" onsubmit="return false;">
<!-- Role Selection: Interactive Bento Grid Style -->
<div class="space-y-4">
<label class="text-sm font-bold text-primary tracking-wide block">اختر الدور الوظيفي</label>
<div class="grid grid-cols-2 gap-3">
<!-- Role Option 1 -->
<label class="relative group cursor-pointer">
<input checked="" class="peer sr-only" name="role" type="radio"/>
<div class="p-4 rounded-2xl bg-surface-container-low border-2 border-transparent peer-checked:border-secondary peer-checked:bg-secondary-container/10 transition-all duration-300 h-full">
<span class="material-symbols-outlined text-secondary mb-2 block" data-icon="admin_panel_settings">admin_panel_settings</span>
<h3 class="font-bold text-on-surface text-sm">مسؤول القاعات</h3>
<p class="text-[10px] text-on-surface-variant mt-1 leading-tight">إدارة الجداول الثابتة والموافقة على الطلبات</p>
</div>
</label>
<!-- Role Option 2 -->
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="role" type="radio"/>
<div class="p-4 rounded-2xl bg-surface-container-low border-2 border-transparent peer-checked:border-secondary peer-checked:bg-secondary-container/10 transition-all duration-300 h-full">
<span class="material-symbols-outlined text-secondary mb-2 block" data-icon="business_center">business_center</span>
<h3 class="font-bold text-on-surface text-sm">مدير الفرع</h3>
<p class="text-[10px] text-on-surface-variant mt-1 leading-tight">متابعة الأداء العام والتقارير التحليلية للفرع</p>
</div>
</label>
<!-- Role Option 3 -->
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="role" type="radio"/>
<div class="p-4 rounded-2xl bg-surface-container-low border-2 border-transparent peer-checked:border-secondary peer-checked:bg-secondary-container/10 transition-all duration-300 h-full">
<span class="material-symbols-outlined text-secondary mb-2 block" data-icon="badge">badge</span>
<h3 class="font-bold text-on-surface text-sm">موظف</h3>
<p class="text-[10px] text-on-surface-variant mt-1 leading-tight">تقديم طلبات الحجز ومتابعة حالة المهام</p>
</div>
</label>
<!-- Role Option 4 -->
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="role" type="radio"/>
<div class="p-4 rounded-2xl bg-surface-container-low border-2 border-transparent peer-checked:border-secondary peer-checked:bg-secondary-container/10 transition-all duration-300 h-full">
<span class="material-symbols-outlined text-secondary mb-2 block" data-icon="assignment_ind">assignment_ind</span>
<h3 class="font-bold text-on-surface text-sm">سكرتير الكلية</h3>
<p class="text-[10px] text-on-surface-variant mt-1 leading-tight">تنظيم المواعيد الأكاديمية والاجتماعات</p>
</div>
</label>
</div>
</div>
<!-- Input Fields -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<div class="space-y-2 md:col-span-2">
<label class="text-xs font-bold text-on-surface-variant pr-2" for="name">الاسم الكامل</label>
<div class="relative">
<input class="w-full px-5 py-4 rounded-xl bg-surface-container-high border-none focus:ring-2 focus:ring-primary/20 placeholder:text-on-surface-variant/50 text-on-surface" id="name" placeholder="أدخل اسمك كما في الهوية" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-bold text-on-surface-variant pr-2" for="uid">الرقم الوظيفي الفريد (Unique ID)</label>
<input class="w-full px-5 py-4 rounded-xl bg-surface-container-high border-none focus:ring-2 focus:ring-primary/20 placeholder:text-on-surface-variant/50 text-on-surface" id="uid" placeholder="مثال: AAST-12345" type="text"/>
</div>
<div class="space-y-2">
<label class="text-xs font-bold text-on-surface-variant pr-2" for="dept">الكلية / القسم</label>
<select class="w-full px-5 py-4 rounded-xl bg-surface-container-high border-none focus:ring-2 focus:ring-primary/20 text-on-surface appearance-none" id="dept">
<option disabled="" selected="" value="">اختر كليتك</option>
<option>كلية النقل البحري</option>
<option>كلية الهندسة</option>
<option>كلية الإدارة</option>
<option>كلية الحاسبات</option>
</select>
</div>
<div class="space-y-2">
<label class="text-xs font-bold text-on-surface-variant pr-2" for="pass">كلمة المرور</label>
<input class="w-full px-5 py-4 rounded-xl bg-surface-container-high border-none focus:ring-2 focus:ring-primary/20 placeholder:text-on-surface-variant/50 text-on-surface" id="pass" placeholder="••••••••" type="password"/>
</div>
<div class="space-y-2">
<label class="text-xs font-bold text-on-surface-variant pr-2" for="confirm">تأكيد كلمة المرور</label>
<input class="w-full px-5 py-4 rounded-xl bg-surface-container-high border-none focus:ring-2 focus:ring-primary/20 placeholder:text-on-surface-variant/50 text-on-surface" id="confirm" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-white font-black text-lg rounded-2xl shadow-xl shadow-primary/10 hover:scale-[1.02] active:scale-95 transition-all duration-300 flex items-center justify-center gap-3">
<span>إنشاء الحساب</span>
<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
</button>
</div>
<!-- Footer Link -->
<div class="text-center">
<p class="text-on-surface-variant text-sm">
                            لديك حساب بالفعل؟ 
                            <a class="text-primary font-bold hover:underline transition-all" href="#">تسجيل الدخول</a>
</p>
</div>
</form>
</div>
</section>
</main>
<!-- Support Link Floating -->
<div class="fixed bottom-8 left-8 hidden lg:block">
<button class="glass-effect p-4 rounded-full flex items-center gap-3 text-primary shadow-lg border border-white hover:bg-white transition-colors">
<span class="material-symbols-outlined" data-icon="help">help</span>
<span class="text-sm font-bold">تحتاج مساعدة؟</span>
</button>
</div>
</body></html>
